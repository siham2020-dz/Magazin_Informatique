<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<h2>Espace Client</h2>

<a href="/">Se déconnecter</a>

<h3>Mes produits achetés</h3>

<table border="1">
    <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Password</th>
        <th>Produit</th>
        <th>Prix</th>
        <th>Quantité</th>
    </tr>

    {% for p in produits %}
    <tr>
        <td>{{ p.nom }}</td>
        <td>{{ p.nom }}</td>
        <td>{{ p.prix }}</td>
        <td>{{ p.quantite }}</td>
    </tr>
    {% endfor %}
</table>
<br>

<a href="/client/{{ id_client }}/commander">
    Passer une commande
</a>

<br><br>

<a href="/panier/{{ id_client }}">
    Voir mon panier
</a>
