<!DOCTYPE html>
<html>
<head>
    <title>Panier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Mon panier</h1>

<a href="/client/{{ id_client }}">Continuer mes achats</a>

{% if produits %}
<table border="1">

<tr>
    <th>Produit</th>
    <th>Prix</th>
    <th>Quantité</th>
    <th>Total</th>
</tr>

{% for p in produits %}

<tr>
    <td>{{ p.nom }}</td>
    <td>{{ p.prix }} €</td>
    <td>{{ p.quantite }}</td>
    <td>{{ p.total }} €</td>
</tr>

{% endfor %}

</table>

<br>

<h2>Total panier : {{ total_panier }} €</h2>

<a href="/paiement/{{ id_client }}">
    Valider le panier et payer
</a>
{% else %}
<p>Votre panier est vide.</p>
{% endif %}

</body>
</html>
